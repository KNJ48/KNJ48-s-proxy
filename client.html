<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Proxy Client</title>
    <style>
        body {
            font-family: Arial;
            margin: 30px;
        }
        input {
            width: 500px;
            padding: 8px;
        }
        button {
            padding: 8px 15px;
            margin-left: 10px;
        }
        iframe {
            width: 100%;
            height: 600px;
            margin-top: 20px;
            border: 1px solid #aaa;
        }
    </style>
</head>
<body>

    <h2>プロキシクライアント</h2>

    <input id="urlInput" placeholder="https://example.com">
    <button onclick="go()">アクセス</button>

    <iframe id="viewer"></iframe>

    <script>
        function go() {
            const url = document.getElementById("urlInput").value;
            const proxyUrl =
                "http://localhost:8080/proxy?url=" +
                encodeURIComponent(url);

            document.getElementById("viewer").src = proxyUrl;
        }
    </script>

</body>
</html>
